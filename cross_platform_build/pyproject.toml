# Python tooling config for the repo's helper/codegen scripts.
# These scripts are dev tooling (not shipped in the Flutter app), but they are
# held to the same "linted + tested" standard as the Dart product code.
#
#   ruff check .            # lint
#   ruff format .           # format
#   pytest                  # run script tests
#
# See ../agents.md -> "Engineering Standards" for the full policy.

[tool.ruff]
target-version = "py38"
line-length = 100
# The Flutter build/platform scaffolding is not ours to lint.
extend-exclude = ["build", ".dart_tool", "android", "ios", "linux", "macos", "windows", "web"]

[tool.ruff.lint]
# Pragmatic-but-real: pyflakes (F), import/syntax errors (E4/E7/E9),
# warnings (W), import sorting (I), and flake8-bugbear (B).
select = ["E4", "E7", "E9", "F", "W", "I", "B"]

[tool.pytest.ini_options]
# Scripts live at the project root; make them importable by their module name.
pythonpath = ["."]
testpaths = ["tests_python"]
python_files = ["test_*.py"]
